name: 🧹 Cleanup Bot Comments

on:
  issue_comment:
    types: [created]

env:
  COMMENT_MARKER: '<!-- bot-comment-id: cleanup-demo -->'

jobs:
  cleanup:
    runs-on: ubuntu-latest
    # CRITICAL: Prevent infinite loop with double protection (Type and Login check)
    if: github.event.issue.pull_request && github.event.comment.user.type != 'Bot' && github.event.comment.user.login != 'github-actions[bot]'
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Minimize Previous Comments
        uses: ./.github/actions/minimize-comments
        with:
          marker: ${{ env.COMMENT_MARKER }}

      - name: Acknowledge Cleanup
        run: gh pr comment $PR_NUMBER --body "$BODY"
        env:
          PR_NUMBER: ${{ github.event.issue.number }}
          BODY: |
            ${{ env.COMMENT_MARKER }}
            ### 🧹 Cleanup Complete
            Previous bot comments have been marked as outdated.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
